{{define "layout"}}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sentinel</title>
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10.20.1",
      "preact/hooks": "https://esm.sh/preact@10.20.1/hooks",
      "htm/preact": "https://esm.sh/htm@3.1.1/preact?external=preact"
    }
  }
  </script>
  <script type="module" src="/static/app.js?v=4"></script>
  <link rel="stylesheet" href="/static/style.css?v=4">
</head>
<body>

<header class="topbar">
  <a href="/" class="brand">Sentinel</a>
</header>

<main class="content">

  {{if eq .Page "dashboard"}}
    {{template "dashboard" .Data}}
  {{else if eq .Page "server"}}
    {{template "server" .Data}}
  {{end}}

</main>

</body>
</html>
{{end}}
