services:
  nats:
    image: nats:2.10-alpine
    container_name: sentinel-nats
    ports:
      - "4222:4222"
      - "8222:8222" # Monitor port

  master:
    image: jeebanjyotimallik/sentinel
    command: master
    container_name: sentinel-master
    depends_on:
      - nats
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  agent:
    image: jeebanjyotimallik/sentinel
    command: agent
    user: "0:0"
    container_name: sentinel-agent
    depends_on:
      - nats
    env_file:
      - .env
    hostname: agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Required to monitor Docker stats
    restart: unless-stopped
